name: Publicar no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Instalar dependências
        run: npm ci

      - name: Gerar build para o Pages
        run: npm run build:pages

      - name: Preparar fallback para rotas Angular
        run: |
          cp dist/loja-games/index.html dist/loja-games/404.html
          touch dist/loja-games/.nojekyll

      - name: Enviar artefato do site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/loja-games

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
